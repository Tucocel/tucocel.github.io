<script>
        const ADMIN_USER = "tucocel";
        const ADMIN_PASS = "admin123"; 
        
        const NUBE_API_URL = "https://api.jsonbin.io/v3/b/6680875fad19ca34f860cb6f";
        const NUBE_KEY = "$2a$10$vWfPqAWh8pCghh8wU/T.ueM5h2O6W8XfWp6Pbe/9hL/B3Iq.mC76m";
        
        let PRODUCTOS = [];
        let carrito = [];
        let marcaSeleccionada = 'Todas';
        let esAdminAutenticado = false;

        // PROCESADOR COMPLETO: Renderiza a un tamaño óptimo para no perder resolución
        document.getElementById('add-foto-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 650; canvas.height = 650;
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, 650, 650);
                    
                    const base64HD = canvas.toDataURL('image/jpeg', 0.85);
                    document.getElementById('foto-base64').value = base64HD;
                    const preview = document.getElementById('preview-foto');
                    preview.src = base64HD; preview.classList.remove('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        async function cargarInventarioNube() {
            try {
                const res = await fetch(NUBE_API_URL + "/latest", {
                    headers: { "X-Master-Key": NUBE_KEY }
                });
                
                if (!res.ok) throw new Error("Error en la respuesta del servidor");
                
                const data = await res.json();
                
                // Corrección de lectura: JSONBin puede devolver el registro directo o dentro de .record
                if (data.record) {
                    PRODUCTOS = Array.isArray(data.record) ? data.record : [];
                } else if (Array.isArray(data)) {
                    PRODUCTOS = data;
                } else {
                    PRODUCTOS = [];
                }
                
                // MIGRACIÓN MEJORADA: Si la nube está vacía pero el administrador tiene respaldo local, lo sube
                const guardadosLocales = localStorage.getItem('tucocel_inventario');
                if (guardadosLocales && PRODUCTOS.length === 0) {
                    const locales = JSON.parse(guardadosLocales);
                    if (locales && locales.length > 0) {
                        PRODUCTOS = locales;
                        await guardarInventarioNube();
                    }
                }
                
                // Verificar sesión del administrador
                const sesionActiva = localStorage.getItem('tucocel_admin_sesion');
                if (sesionActiva === 'true') {
                    esAdminAutenticado = true;
                    const panel = document.getElementById('panel-admin');
                    if(panel) panel.classList.remove('hidden');
                }
                
                ejecutarFiltroCombinado();
            } catch (e) {
                console.error("Error detallado:", e);
                document.getElementById('contenedor-productos').innerHTML = 
                    `<p class='text-center text-xs text-red-400 col-span-full py-10'>⚠️ Error de conexión con la nube. Detalles: ${e.message}</p>`;
            }
        }

        async function guardarInventarioNube() {
            const btn = document.getElementById('btn-guardar');
            if(btn) { btn.disabled = true; btn.innerText = "⏳ Guardando en la Nube..."; }
            try {
                const res = await fetch(NUBE_API_URL, {
                    method: "PUT",
                    headers: { 
                        "Content-Type": "application/json", 
                        "X-Master-Key": NUBE_KEY 
                    },
                    body: JSON.stringify(PRODUCTOS)
                });
                if(!res.ok) throw new Error("No se pudo guardar");
            } catch (e) {
                alert("Fallo al sincronizar con el servidor de la nube.");
                console.error(e);
            } finally {
                if(btn) { btn.disabled = false; btn.innerText = "Guardar en Inventario"; }
            }
        }

        function ejecutarFiltroCombinado() {
            const buscadorInput = document.getElementById('buscador');
            const textoBuscador = buscadorInput ? buscadorInput.value.toLowerCase() : '';
            
            const filtrados = PRODUCTOS.filter(p => {
                const coincideMarca = (marcaSeleccionada === 'Todas' || p.marca.toLowerCase() === marcaSeleccionada.toLowerCase());
                const coincideTexto = p.modelo.toLowerCase().includes(textoBuscador) || p.marca.toLowerCase().includes(textoBuscador);
                return coincideMarca && coincideTexto;
            });
            renderizarCatalogoHTML(filtrados);
        }

        function renderizarCatalogoHTML(lista) {
            const contenedor = document.getElementById('contenedor-productos');
            const contador = document.getElementById('contador-productos');
            
            if(contador) {
                contador.innerText = `${lista.length} ${lista.length === 1 ? 'Disponible' : 'Disponibles'}`;
            }
            
            if(!contenedor) return;
            
            if(lista.length === 0) { 
                contenedor.innerHTML = '<div class="text-center col-span-full py-12 text-gray-400 text-sm font-medium">No hay stock disponible en esta selección.</div>'; 
                return; 
            }
            
            contenedor.innerHTML = '';
            lista.forEach(prod => {
                const fotoProd = prod.foto || 'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=600&auto=format&fit=crop&q=80';
                const botonesEdicion = esAdminAutenticado ? `
                    <div class="flex gap-2 border-t border-gray-100 pt-2 mt-1 w-full justify-center">
                        <button onclick="event.stopPropagation(); editarPrecio('${prod.id}')" class="text-blue-600 hover:text-blue-800 text-xs px-2 py-1 bg-blue-50 rounded-lg font-bold"><i class="fa-solid fa-pen-to-square mr-1"></i>Precio</button>
                        <button onclick="event.stopPropagation(); eliminarProducto('${prod.id}')" class="text-red-500 hover:text-red-700 text-xs px-2 py-1 bg-red-50 rounded-lg font-bold"><i class="fa-solid fa-trash-can mr-1"></i>Borrar</button>
                    </div>
                ` : '';

                contenedor.innerHTML += `
                    <div onclick="abrirDetalleProducto('${prod.id}')" class="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm flex flex-col justify-between transition-all cursor-pointer hover:shadow-xl hover:border-gray-200 group relative">
                        <div>
                            <div class="aspect-square w-full bg-white border border-gray-100 rounded-xl overflow-hidden mb-4 flex justify-center items-center p-1">
                                <img src="${fotoProd}" class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-300 filter drop-shadow-md" onerror="this.src='https://via.placeholder.com/400'">
                            </div>
                            <span class="text-[9px] font-extrabold text-blue-600 uppercase tracking-widest bg-blue-50 px-2 py-0.5 rounded-md inline-block mb-1.5">${prod.marca}</span>
                            <h3 class="font-bold text-gray-900 text-base group-hover:text-blue-600 transition-colors truncate">${prod.modelo}</h3>
                            <p class="text-xs text-gray-400 font-medium mt-0.5">${prod.memoria || 'Estándar'}</p>
                            <p class="text-xs text-gray-500 font-light line-clamp-2 mt-1.5 leading-relaxed">${prod.desc || 'Sin descripción adicional.'}</p>
                        </div>
                        
                        <div class="mt-5">
                            <div class="flex items-center justify-between pt-3 border-t border-gray-50">
                                <div>
                                    <span class="text-[9px] text-gray-400 block uppercase font-bold">Precio</span>
                                    <p class="text-base font-black text-gray-900">$${prod.precio} <span class="text-[10px] text-gray-400 font-bold">USD</span></p>
                                </div>
                                <button onclick="event.stopPropagation(); agregarAlCarrito('${prod.id}', this)" class="bg-slate-900 text-white w-9 h-9 rounded-xl flex items-center justify-center hover:bg-blue-600 shadow-md transition-colors">
                                    <i class="fa-solid fa-plus text-xs"></i>
                                </button>
                            </div>
                            ${botonesEdicion}
                        </div>
                    </div>`;
            });
        }

        function abrirDetalleProducto(id) {
            const prod = PRODUCTOS.find(p => p.id === id);
            if (!prod) return;

            document.getElementById('detalle-foto').src = prod.foto || 'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=600&auto=format&fit=crop&q=80';
            document.getElementById('detalle-marca').innerText = prod.marca;
            document.getElementById('detalle-modelo').innerText = prod.modelo;
            document.getElementById('detalle-memoria').innerText = prod.memoria || 'Estándar';
            document.getElementById('detalle-desc').innerText = prod.desc || 'Sin descripción adicional.';
            document.getElementById('detalle-precio').innerText = `${prod.precio}`;
            
            const btnAgregar = document.getElementById('btn-detalle-agregar');
            btnAgregar.onclick = function() {
                agregarAlCarrito(prod.id, btnAgregar);
                cerrarModalDetalle();
            };

            document.getElementById('modal-detalle').classList.remove('hidden');
        }

        function cerrarModalDetalle() { document.getElementById('modal-detalle').classList.add('hidden'); }
        function abrirLoginAdmin() { if(esAdminAutenticado) { toggleAdminPanel(); } else { document.getElementById('modal-login').classList.remove('hidden'); } }
        function cerrarLoginAdmin() { document.getElementById('modal-login').classList.add('hidden'); }
        
        function autenticarAdmin() {
            const user = document.getElementById('admin-user').value.trim();
            const pass = document.getElementById('admin-pass').value.trim();
            if(user === ADMIN_USER && pass === ADMIN_PASS) {
                esAdminAutenticado = true;
                localStorage.setItem('tucocel_admin_sesion', 'true');
                cerrarLoginAdmin();
                document.getElementById('panel-admin').classList.remove('hidden');
                ejecutarFiltroCombinado();
            } else {
                alert('Usuario o contraseña incorrectos.');
            }
        }

        function cerrarSesionAdmin() {
            esAdminAutenticado = false;
            localStorage.removeItem('tucocel_admin_sesion');
            document.getElementById('panel-admin').classList.add('hidden');
            ejecutarFiltroCombinado();
        }

        async function guardarProductoNuevo() {
            const marca = document.getElementById('add-marca').value;
            const modelo = document.getElementById('add-modelo').value.trim();
            const memoria = document.getElementById('add-memoria').value.trim();
            const precio = parseInt(document.getElementById('add-precio').value.trim()) || 0;
            const foto = document.getElementById('foto-base64').value;
            const desc = document.getElementById('add-desc').value.trim();

            if(!modelo || !precio) { alert('Llena modelo y precio.'); return; }
            
            PRODUCTOS.unshift({ id: new Date().getTime().toString(), marca, modelo, memoria, precio, foto, desc });
            
            await guardarInventarioNube();
            ejecutarFiltroCombinado();

            document.getElementById('add-modelo').value = ''; 
            document.getElementById('add-memoria').value = '';
            document.getElementById('add-precio').value = ''; 
            document.getElementById('add-desc').value = '';
            document.getElementById('add-foto-file').value = ''; 
            document.getElementById('foto-base64').value = '';
            const preview = document.getElementById('preview-foto');
            if(preview) preview.classList.add('hidden');
            
            alert('¡Equipo guardado con éxito en el servidor!');
        }

        async function editarPrecio(id) {
            const producto = PRODUCTOS.find(p => p.id === id);
            if(!producto) return;
            const nuevoPrecio = prompt(`Modificar precio para ${producto.modelo}:`, producto.precio);
            if(nuevoPrecio !== null && !isNaN(nuevoPrecio) && nuevoPrecio.trim() !== '') {
                producto.precio = parseInt(nuevoPrecio);
                await guardarInventarioNube();
                ejecutarFiltroCombinado();
            }
        }

        async function eliminarProducto(id) {
            if(confirm('¿Deseas borrar el producto por completo del catálogo?')) {
                PRODUCTOS = PRODUCTOS.filter(p => p.id !== id);
                await guardarInventarioNube();
                ejecutarFiltroCombinado();
            }
        }

        function agregarAlCarrito(id, boton) {
            const item = PRODUCTOS.find(p => p.id === id);
            if(!item) return;
            carrito.push(item);
            actualizarInterfazCarrito();
            
            const viejoTexto = boton.innerHTML;
            const viejoClass = boton.className;
            
            boton.className = "bg-emerald-500 text-white px-4 py-2.5 rounded-xl font-bold text-xs flex items-center gap-1.5";
            boton.innerHTML = '<i class="fa-solid fa-check text-xs"></i> ¡Agregado!';
            
            setTimeout(() => { 
                boton.className = viejoClass; 
                boton.innerHTML = viejoTexto; 
            }, 1000);
        }

        function actualizarInterfazCarrito() {
            const barra = document.getElementById('barra-carrito');
            if(!barra) return;
            if(carrito.length === 0) { barra.classList.add('hidden'); return; }
            const total = carrito.reduce((sum, item) => sum + item.precio, 0);
            document.getElementById('total-carrito').innerText = `$${total}.00 USD`;
            document.getElementById('cant-articulos').innerText = carrito.length;
            barra.classList.remove('hidden');
        }

        function abrirModalPago() { document.getElementById('modal-pago').classList.remove('hidden'); }
        function cerrarModalPago() { document.getElementById('modal-pago').classList.add('hidden'); }
        function toggleAdminPanel() { document.getElementById('panel-admin').classList.toggle('hidden'); }
        
        function filtrarPorMarca(marca) { 
            marcaSeleccionada = marca; 
            const botones = document.querySelectorAll('.marca-btn'); 
            botones.forEach(btn => { 
                if (btn.innerText.includes(marca)) { 
                    btn.className = "marca-btn snap-start shrink-0 bg-slate-900 text-white px-4 py-2.5 rounded-xl text-xs font-bold shadow-sm transition-all"; 
                } else { 
                    btn.className = "marca-btn snap-start shrink-0 bg-white text-gray-700 border border-gray-200 px-4 py-2.5 rounded-xl text-xs font-bold shadow-sm transition-all"; 
                } 
            }); 
            ejecutarFiltroCombinado(); 
        }

        function filtrarProductos() { ejecutarFiltroCombinado(); }

        function enviarPedidoWhatsApp() {
            const nombre = document.getElementById('cliente-nombre').value.trim();
            const telefono = document.getElementById('cliente-telefono').value.trim();
            const pago = document.getElementById('cliente-pago').value;
            const direccion = document.getElementById('cliente-direccion').value.trim();

            if(!nombre || !telefono || !direccion) { alert("Por favor complete todos los campos obligatorios (*)"); return; }

            let mensaje = `*NUEVO PEDIDO - TUCOCEL C.A.*\n\n`;
            mensaje += `*Cliente:* ${nombre}\n`;
            mensaje += `*Teléfono:* ${telefono}\n`;
            mensaje += `*Forma de Pago:* ${pago}\n`;
            mensaje += `*Dirección:* ${direccion}\n\n`;
            mensaje += `*Equipos Solicitados:*\n`;

            carrito.forEach((item, index) => {
                mensaje += `${index + 1}. ${item.marca} ${item.modelo} - $${item.precio} USD\n`;
            });

            const total = carrito.reduce((sum, item) => sum + item.precio, 0);
            mensaje += `\n*TOTAL ESTIMADO:* $${total}.00 USD`;

            const linkWha = `https://wa.me/584247357549?text=${encodeURIComponent(mensaje)}`;
            window.open(linkWha, '_blank');
            carrito = [];
            actualizarInterfazCarrito();
            cerrarModalPago();
        }

        window.onload = cargarInventarioNube;
    </script>
